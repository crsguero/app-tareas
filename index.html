<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Tareas</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://cdn.quilljs.com/1.3.7/quill.bubble.css" rel="stylesheet" />
</head>
<body>
  <div class="app-layout">

    <nav class="sidebar">
      <div class="sidebar-brand">Tareas</div>
      <button class="nav-item active" data-view="hoy" data-owner="cristina">
        <span class="nav-owner-avatar" style="background:#7c3aed">C</span>
        Cristina
      </button>
      <button class="nav-item" data-view="hoy" data-owner="fernando">
        <span class="nav-owner-avatar" style="background:#2563eb">F</span>
        Fernando
      </button>
      <button class="nav-item" data-view="planificadas">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 6h13M8 12h13M8 18h13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="4" cy="6" r="1.2" fill="currentColor"/>
          <circle cx="4" cy="12" r="1.2" fill="currentColor"/>
          <circle cx="4" cy="18" r="1.2" fill="currentColor"/>
        </svg>
        Planificadas
      </button>
    </nav>

    <main class="content">

      <!-- Vista: Hoy -->
      <div id="view-hoy" class="view">
        <header class="view-header">
          <h1>Hoy</h1>
        </header>

        <form id="task-form">
          <div class="input-group">
            <input
              type="text"
              id="task-input"
              placeholder="Escribe una nueva tarea..."
              autocomplete="off"
              maxlength="200"
            />
            <button type="submit" id="add-btn">
              <span class="btn-icon">+</span>
              <span class="btn-text">Añadir</span>
            </button>
          </div>
        </form>

        <div id="task-list-wrapper">
          <div id="completed-section" hidden>
            <button id="completed-toggle" class="link-btn"></button>
            <button id="completed-clear" class="link-btn">Borrar</button>
          </div>
          <ul id="task-list"></ul>
          <ul id="completed-list" hidden></ul>
          <div id="empty-state" class="empty-state">
            <div class="empty-icon">📝</div>
            <p>No tienes tareas todavía.<br />¡Añade tu primera tarea!</p>
          </div>
        </div>

      </div>

      <!-- Vista: Planificadas -->
      <div id="view-planificadas" class="view" hidden>
        <header class="view-header">
          <div>
            <h1>Planificadas</h1>
            <p class="subtitle">Tareas recurrentes</p>
          </div>
          <button id="new-plan-btn">+ Nueva tarea</button>
        </header>

        <div class="plan-body">
          <div id="detail-task-list-wrapper">
            <table id="detail-task-table" class="plan-table">
              <thead>
                <tr>
                  <th>Nombre</th>
                  <th>Responsable</th>
                  <th id="th-repeat" class="th-sortable">Repetición <span class="sort-indicator">↕</span></th>
                  <th>Día de inicio</th>
                  <th id="th-category" class="th-sortable">Categoría <span class="sort-indicator">↕</span></th>
                </tr>
              </thead>
              <tbody id="detail-task-list"></tbody>
            </table>
            <div id="detail-empty-state" class="empty-state">
              <p>No hay tareas planificadas todavía.</p>
            </div>
          </div>

          <aside id="edit-panel">
            <div class="edit-panel-inner">
              <div class="edit-panel-header">
                <h2>Editar tarea</h2>
                <button id="edit-panel-close" aria-label="Cerrar">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  </svg>
                </button>
              </div>
              <form id="edit-task-form">
                <div class="field-group">
                  <label for="edit-title">Título</label>
                  <input type="text" id="edit-title" placeholder="Nombre de la tarea" maxlength="200" autocomplete="off" />
                </div>
                <div class="field-group">
                  <label for="edit-category">Categoría</label>
                  <div class="select-color-wrap">
                    <span id="edit-category-dot" class="category-dot"></span>
                    <select id="edit-category">
                      <option value="hogar">Hogar</option>
                      <option value="personal">Personal</option>
                      <option value="salud">Salud</option>
                    </select>
                  </div>
                </div>
                <div class="field-group">
                  <label for="edit-owner">Responsable</label>
                  <select id="edit-owner">
                    <option value="cristina">Cristina</option>
                    <option value="fernando">Fernando</option>
                  </select>
                </div>
                <div class="field-group">
                  <label for="edit-date">Fecha de inicio</label>
                  <input type="date" id="edit-date" />
                </div>
                <div class="field-group">
                  <label for="edit-repeat">Repetición</label>
                  <select id="edit-repeat">
                    <option value="daily">Diariamente</option>
                    <option value="weekly">Semanalmente</option>
                    <option value="monthly">Mensualmente</option>
                    <option value="quarterly">Trimestralmente</option>
                    <option value="yearly">Anualmente</option>
                    <option value="biannually">Cada dos años</option>
                  </select>
                </div>
                <div class="field-group" id="edit-weekday-group" hidden>
                  <label for="edit-weekday">Día de la semana</label>
                  <select id="edit-weekday">
                    <option value="1">Lunes</option>
                    <option value="2">Martes</option>
                    <option value="3">Miércoles</option>
                    <option value="4">Jueves</option>
                    <option value="5">Viernes</option>
                    <option value="6">Sábado</option>
                    <option value="0">Domingo</option>
                  </select>
                </div>
                <div class="field-group">
                  <label>Subtareas</label>
                  <ul id="edit-subtasks-list"></ul>
                  <button type="button" id="edit-add-subtask">+ Añadir subtarea</button>
                </div>
                <div class="field-group">
                  <label>Descripción</label>
                  <div id="description-editor"></div>
                </div>
                <div class="field-group">
                  <label for="edit-link">Enlace</label>
                  <input type="url" id="edit-link" placeholder="https://..." autocomplete="off" />
                </div>
                <button type="submit" class="detail-add-btn">Guardar cambios</button>
                <button type="button" id="edit-delete-btn">Eliminar tarea</button>
              </form>
            </div>
          </aside>
        </div>
      </div>

    </main>

    <aside id="hoy-detail-panel">
      <div class="hoy-panel-inner">
        <button id="hoy-panel-close" aria-label="Cerrar" class="hoy-close-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>

        <h2 id="hoy-panel-title" class="hoy-title"></h2>
        <p class="hoy-meta">
          <span id="hoy-meta-date-wrap">
            <svg class="hoy-meta-icon" width="12" height="12" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="1" y="2.5" width="12" height="10.5" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
              <path d="M1 6h12" stroke="currentColor" stroke-width="1.4"/>
              <path d="M4.5 1v3M9.5 1v3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            <span id="hoy-panel-date"></span>
          </span>
          <span id="hoy-meta-sep"> · </span>
          <span id="hoy-meta-repeat-wrap">
            <svg class="hoy-meta-icon" width="12" height="12" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M2.5 6A4.5 4.5 0 0 1 11.5 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <path d="M11.5 8A4.5 4.5 0 0 1 2.5 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <path d="M9.5 4l2 2 2-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M4.5 10l-2-2-2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span id="hoy-panel-repeat"></span>
          </span>
        </p>

        <div id="hoy-panel-subtasks-field" hidden>
          <ul id="hoy-panel-subtasks-list"></ul>
        </div>

        <div id="hoy-panel-desc-field" hidden>
          <div id="hoy-panel-desc-editor"></div>
        </div>

        <button type="button" id="hoy-panel-delete-btn">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 4h10M6.5 4V2.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5V4M5.5 4l.5 9h4l.5-9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Eliminar tarea
        </button>
      </div>
    </aside>

  </div>

  <!-- Modal nueva tarea planificada -->
  <div id="plan-modal-overlay" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2>Nueva tarea</h2>
        <button id="plan-modal-close" aria-label="Cerrar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <form id="detail-task-form">
        <div class="field-group">
          <label for="detail-title">Título</label>
          <input type="text" id="detail-title" placeholder="Nombre de la tarea" maxlength="200" autocomplete="off" />
        </div>
        <div class="field-group">
          <label for="detail-category">Categoría</label>
          <div class="select-color-wrap">
            <span id="category-dot" class="category-dot"></span>
            <select id="detail-category">
              <option value="hogar">Hogar</option>
              <option value="personal">Personal</option>
              <option value="salud">Salud</option>
            </select>
          </div>
        </div>
        <div class="field-group">
          <label for="detail-owner">Responsable</label>
          <select id="detail-owner">
            <option value="cristina">Cristina</option>
            <option value="fernando">Fernando</option>
          </select>
        </div>
        <div class="field-group">
          <label for="detail-date">Fecha de inicio</label>
          <input type="date" id="detail-date" />
        </div>
        <div class="field-group">
          <label for="detail-repeat">Repetición</label>
          <select id="detail-repeat">
            <option value="daily">Diariamente</option>
            <option value="weekly">Semanalmente</option>
            <option value="monthly">Mensualmente</option>
            <option value="quarterly">Trimestralmente</option>
            <option value="yearly">Anualmente</option>
            <option value="biannually">Cada dos años</option>
          </select>
        </div>
        <div class="field-group" id="weekday-group" hidden>
          <label for="detail-weekday">Día de la semana</label>
          <select id="detail-weekday">
            <option value="1">Lunes</option>
            <option value="2">Martes</option>
            <option value="3">Miércoles</option>
            <option value="4">Jueves</option>
            <option value="5">Viernes</option>
            <option value="6">Sábado</option>
            <option value="0">Domingo</option>
          </select>
        </div>
        <div class="field-group">
          <label for="detail-link">Enlace</label>
          <input type="url" id="detail-link" placeholder="https://..." autocomplete="off" />
        </div>
        <button type="submit" class="detail-add-btn">Añadir tarea</button>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
